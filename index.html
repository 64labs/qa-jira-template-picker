<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Jira Template Picker</title>
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface-alt: #f1f1ee;
  --border: #dddbd4;
  --border-strong: #c5c3bb;
  --text: #1f1f1d;
  --text-secondary: #5f5e5a;
  --text-muted: #979690;
  --accent: #185fa5;
  --accent-bg: #e6f1fb;
  --accent-border: #85b7eb;
  --success: #0f6e56;
  --success-bg: #e1f5ee;
  --success-border: #5dcaa5;
  --danger: #a32d2d;
  --danger-border: #f09595;
  --radius: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1b1b19;
    --surface: #262624;
    --surface-alt: #2e2e2b;
    --border: #3a3a37;
    --border-strong: #4c4c48;
    --text: #ececea;
    --text-secondary: #b4b2a9;
    --text-muted: #7c7b75;
    --accent: #85b7eb;
    --accent-bg: #0c2c4c;
    --accent-border: #378add;
    --success: #5dcaa5;
    --success-bg: #08322a;
    --success-border: #1d9e75;
    --danger: #f09595;
    --danger-border: #a32d2d;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.topbar h1 { font-size: 16px; font-weight: 600; }
.topbar .repo-link { font-size: 12px; color: var(--text-muted); text-decoration: none; }
.topbar .repo-link:hover { color: var(--accent); }
.layout { display: flex; min-height: calc(100vh - 49px); }
.sidebar {
  width: 260px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 20px;
  background: var(--surface);
}
.main {
  flex: 1; padding: 20px 24px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 16px; align-content: start;
}
.field-label {
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
}
.field-label-hint { font-size: 10px; font-weight: 400; color: var(--text-muted); text-transform: none; letter-spacing: 0; margin-left: 4px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
input[type="text"] {
  width: 100%; font-size: 13px; padding: 8px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius);
  background: var(--surface); color: var(--text); outline: none;
}
input[type="text"]:focus { border-color: var(--accent-border); }
input::placeholder, textarea::placeholder { color: var(--text-muted); }
textarea {
  width: 100%; font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  resize: vertical; min-height: 90px; line-height: 1.5;
  padding: 8px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius); background: var(--surface);
  color: var(--text); outline: none;
}
textarea:focus { border-color: var(--accent-border); }
.env-preview {
  font-size: 11px; color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.env-preview.ready { color: var(--accent); }
.chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.chip {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 8px; font-size: 12px;
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; text-align: center; user-select: none;
  transition: all 0.1s;
}
.chip:hover { border-color: var(--border-strong); }
.chip.active { border-color: var(--accent-border); background: var(--accent-bg); color: var(--accent); }
.divider { height: 1px; background: var(--border); }
.clear-btn {
  width: 100%; font-size: 12px; padding: 7px 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius);
  background: var(--surface); color: var(--text-secondary);
  transition: all 0.1s;
}
.clear-btn:hover { color: var(--danger); border-color: var(--danger-border); }
.saved-note { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 6px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 10px;
  height: fit-content;
}
.card-header { display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 600; }
.tag { font-size: 11px; padding: 2px 10px; border-radius: 99px; }
.tag-description { background: var(--accent-bg); color: var(--accent); }
.tag-comment { background: var(--success-bg); color: var(--success); }
.card-body {
  font-size: 12px; color: var(--text-secondary);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  white-space: pre-wrap; line-height: 1.6;
  background: var(--surface-alt); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  max-height: 260px; overflow-y: auto;
}
.copy-btn {
  align-self: flex-end; font-size: 12px; padding: 6px 14px; cursor: pointer;
  border: 1px solid var(--border-strong); border-radius: var(--radius);
  background: var(--surface); color: var(--text);
  display: flex; align-items: center; gap: 6px; transition: all 0.1s;
}
.copy-btn:hover { background: var(--surface-alt); }
.copy-btn.copied { border-color: var(--success-border); color: var(--success); }
.placeholder { color: var(--accent); font-weight: 600; }
.jira-link { color: var(--success); }
.load-error {
  grid-column: 1 / -1; font-size: 13px; color: var(--text-muted);
  padding: 12px; border: 1px dashed var(--border-strong); border-radius: var(--radius);
}
@media (max-width: 760px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
  .main { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>QA Jira Template Picker</h1>
  <a class="repo-link" href="https://github.com/64labs/qa-jira-template-picker" target="_blank" rel="noopener">64labs/qa-jira-template-picker</a>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="field-group">
      <div class="field-label">Environment</div>
      <input type="text" id="env-name" placeholder="staging" autocomplete="off" />
      <input type="text" id="env-url" placeholder="https://staging.site.com" autocomplete="off" style="margin-top:4px" />
      <div class="env-preview" id="env-preview">Jira: [name|url]</div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <div class="field-label">Browsers</div>
      <div class="chip-grid" id="browsers"></div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <div class="field-label">Initial steps <span class="field-label-hint">optional</span></div>
      <textarea id="initial-steps" placeholder="1. Open PDP&#10;2. Add to cart&#10;3. Go to checkout"></textarea>
    </div>

    <div class="divider"></div>

    <div>
      <button class="clear-btn" id="clear-btn">🗑 Clear session</button>
      <div class="saved-note">Auto-saved in this browser</div>
    </div>
  </aside>

  <main class="main" id="templates-area"></main>
</div>

<script>
const STORAGE_KEY = 'qa-jira-template-picker';

// Fallback config — used when config.json can't be fetched (e.g. opened as file://)
const DEFAULT_CONFIG = {
  browsers: ["Chrome", "Firefox", "Safari", "iOS Safari", "Android"],
  templates: [
    {
      id: "bug-desc",
      title: "Bug description",
      tag: "description",
      body: "## Environment\n- Env: {{env}}\n- Browsers: {{browsers}}\n\n## Steps to reproduce\n{{steps}}\n## Expected\n\n\n## Actual\n\n\n## Screenshots / logs\n"
    },
    {
      id: "verified",
      title: "Verified",
      tag: "comment",
      body: "\u2705 Verified on {{env}}\nBrowsers: {{browsers}}"
    },
    {
      id: "cannot-reproduce",
      title: "Cannot reproduce",
      tag: "comment",
      body: "\ud83d\udd0d Cannot reproduce on {{env}}\nBrowsers: {{browsers}}\n\nSteps followed as described. Please provide additional context or a recording."
    },
    {
      id: "regression-desc",
      title: "Regression",
      tag: "description",
      body: "## Regression\n- Env: {{env}}\n- Browsers: {{browsers}}\n\n## Last known working build\n\n\n## Steps to reproduce\n{{steps}}\n## Expected\n\n\n## Actual\n"
    }
  ]
};

let config = DEFAULT_CONFIG;
let state = { envName: '', envUrl: '', browsers: [], initialSteps: '' };

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state = {
        envName: p.envName || '',
        envUrl: p.envUrl || '',
        browsers: Array.isArray(p.browsers) ? p.browsers : [],
        initialSteps: p.initialSteps || ''
      };
    }
  } catch (e) {}
}

function jiraEnv() {
  if (state.envName && state.envUrl) return `[${state.envName}|${state.envUrl}]`;
  return state.envName || state.envUrl || '{{env}}';
}

function fillTemplate(body) {
  const browsers = state.browsers.length ? state.browsers.join(', ') : '{{browsers}}';
  const steps = state.initialSteps.trim() ? state.initialSteps.trim() + '\n' : '';
  return body
    .replaceAll('{{env}}', jiraEnv())
    .replaceAll('{{browsers}}', browsers)
    .replaceAll('{{steps}}', steps);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlight(text) {
  return escapeHtml(text)
    .replace(/\[([^\]|]+)\|([^\]]+)\]/g, '<span class="jira-link">[$1|$2]</span>')
    .replace(/\{\{[^}]+\}\}/g, m => `<span class="placeholder">${m}</span>`);
}

function updateEnvPreview() {
  const el = document.getElementById('env-preview');
  if (state.envName && state.envUrl) {
    el.textContent = `\u2192 [${state.envName}|${state.envUrl}]`;
    el.classList.add('ready');
  } else if (state.envName || state.envUrl) {
    el.textContent = `\u2192 ${state.envName || state.envUrl}`;
    el.classList.remove('ready');
  } else {
    el.textContent = 'Jira: [name|url]';
    el.classList.remove('ready');
  }
}

function renderBrowsers() {
  const grid = document.getElementById('browsers');
  grid.innerHTML = '';
  config.browsers.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.browsers.includes(b) ? ' active' : '');
    chip.textContent = b;
    chip.addEventListener('click', () => {
      if (state.browsers.includes(b)) state.browsers = state.browsers.filter(x => x !== b);
      else state.browsers.push(b);
      chip.classList.toggle('active', state.browsers.includes(b));
      update();
    });
    grid.appendChild(chip);
  });
}

function renderTemplates() {
  const area = document.getElementById('templates-area');
  area.innerHTML = '';
  config.templates.forEach(t => {
    const content = fillTemplate(t.body);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${escapeHtml(t.title)}</span>
        <span class="tag tag-${t.tag === 'description' ? 'description' : 'comment'}">${escapeHtml(t.tag)}</span>
      </div>
      <div class="card-body">${highlight(content)}</div>
      <button class="copy-btn" data-id="${t.id}">\u29c9 Copy</button>
    `;
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      const btn = e.currentTarget;
      navigator.clipboard.writeText(fillTemplate(t.body)).then(() => {
        btn.textContent = '\u2713 Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '\u29c9 Copy'; btn.classList.remove('copied'); }, 1500);
      });
    });
    area.appendChild(card);
  });
}

function update() { saveState(); updateEnvPreview(); renderTemplates(); }

function syncInputs() {
  document.getElementById('env-name').value = state.envName;
  document.getElementById('env-url').value = state.envUrl;
  document.getElementById('initial-steps').value = state.initialSteps;
}

document.getElementById('env-name').addEventListener('input', e => { state.envName = e.target.value; update(); });
document.getElementById('env-url').addEventListener('input', e => { state.envUrl = e.target.value; update(); });
document.getElementById('initial-steps').addEventListener('input', e => { state.initialSteps = e.target.value; update(); });

document.getElementById('clear-btn').addEventListener('click', () => {
  state = { envName: '', envUrl: '', browsers: [], initialSteps: '' };
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  syncInputs();
  renderBrowsers();
  updateEnvPreview();
  renderTemplates();
});

async function init() {
  loadState();
  try {
    const res = await fetch('./config.json', { cache: 'no-store' });
    if (res.ok) {
      const json = await res.json();
      if (json && Array.isArray(json.templates) && json.templates.length) {
        config = {
          browsers: Array.isArray(json.browsers) && json.browsers.length ? json.browsers : DEFAULT_CONFIG.browsers,
          templates: json.templates
        };
      }
    }
  } catch (e) { /* file:// or offline — use defaults */ }

  // drop saved browsers that no longer exist in config
  state.browsers = state.browsers.filter(b => config.browsers.includes(b));

  syncInputs();
  renderBrowsers();
  updateEnvPreview();
  renderTemplates();
}

init();
</script>
</body>
</html>
